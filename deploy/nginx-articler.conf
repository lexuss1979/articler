# Reference nginx server block for articler.lexdev.ru.
# Place at /etc/nginx/sites-available/articler.lexdev.ru, symlink into
# sites-enabled, then run `sudo certbot --nginx -d articler.lexdev.ru`
# to issue the cert and rewrite this file with TLS.
#
# The compose stack publishes the web container on 127.0.0.1:3000, so
# only this nginx config has access — it is not reachable from the
# public internet directly.

server {
    listen 80;
    listen [::]:80;
    server_name articler.lexdev.ru;

    # Articler accepts uploads (avatars, profile assets) — bump from default 1m.
    client_max_body_size 25m;

    # HTTP basic auth — second perimeter before the app sees any traffic.
    # Prevents random scanners from reaching Next.js. Operator manages users
    # in /etc/nginx/.htpasswd-articler (see README "Deploying" section).
    auth_basic           "articler — invite-only";
    auth_basic_user_file /etc/nginx/.htpasswd-articler;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /api/stream/* uses Server-Sent Events. Disable buffering and
        # extend the read timeout so long-lived connections don't get cut.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }
}
