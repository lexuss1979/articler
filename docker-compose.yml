services:
  web:
    build: .
    ports:
      - '18080:3000'
    environment:
      DATABASE_URL: postgres://articler:articler@db:5432/articler
      AUTH_URL: http://localhost:18080
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    profiles: ['e2e']
    network_mode: host
    ipc: host
    working_dir: /work
    volumes:
      - .:/work
      - e2e_node_modules:/work/node_modules
    environment:
      E2E_BASE_URL: http://localhost:18080
      CI: '1'
    command:
      - bash
      - -lc
      - npm install --prefer-offline --no-save --no-audit --no-fund --silent @playwright/test@1.59.1 && npx playwright test
    depends_on:
      web:
        condition: service_started

  db:
    image: postgres:16-alpine
    ports:
      - '13036:5432'
    environment:
      POSTGRES_USER: articler
      POSTGRES_PASSWORD: articler
      POSTGRES_DB: articler
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U articler -d articler']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  e2e_node_modules:
