services:
  web:
    image: ghcr.io/lexuss1979/articler:latest
    pull_policy: always
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    # Bind to loopback only — host nginx terminates TLS and proxies here.
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - ./logs:/app/logs
      - data:/app/data
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

volumes:
  db_data:
  data:

networks:
  internal:
